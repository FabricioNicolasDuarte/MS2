<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    
 
    <script src="https://cdn.tailwindcss.com"></script>
    
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
       
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex flex-col justify-center items-center p-6">

    
    <div class="w-full max-w-md bg-gray-900/50 backdrop-blur-sm p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h2 class="text-3xl font-bold text-center text-gray-100 mb-6">Crear una Cuenta</h2>
        <form>
           
            <div class="mb-4">
                <label for="username" class="block text-gray-400 text-sm font-bold mb-2">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Elige un nombre de usuario" class="w-full px-3 py-2 text-gray-200 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition duration-300">
            </div>

          
            <div class="mb-4">
                <label for="email" class="block text-gray-400 text-sm font-bold mb-2">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu-email@ejemplo.com" class="w-full px-3 py-2 text-gray-200 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition duration-300">
            </div>

         
            <div class="mb-4">
                <label for="password" class="block text-gray-400 text-sm font-bold mb-2">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" class="w-full px-3 py-2 text-gray-200 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition duration-300">
            </div>

        
            <div class="mb-6">
                <label for="confirm-password" class="block text-gray-400 text-sm font-bold mb-2">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" class="w-full px-3 py-2 text-gray-200 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition duration-300">
            </div>

          
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300 ease-in-out transform hover:scale-105">
                Registrarse
            </button>
        </form>

        
        <p class="text-center text-gray-400 text-sm mt-6">
            ¿Ya tienes una cuenta? 
            <a href="#" class="font-medium text-cyan-400 hover:text-cyan-300">
                Inicia sesión
            </a>
        </p>
    </div>

</body>
</html>
